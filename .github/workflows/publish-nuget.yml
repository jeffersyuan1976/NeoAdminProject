# 推送 v* 标签时，将 NeoAdmin.Blazor 与 NeoAdmin.Templates 打包并发布到 nuget.org
# 前置：仓库 Settings → Secrets → NUGET_API_KEY（nuget.org 创建的 Push API Key）

name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (from $TAG)"

      - name: Pack NeoAdmin.Blazor
        run: dotnet pack NeoAdmin.Blazor/NeoAdmin.Blazor.csproj -c Release -o ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Pack NeoAdmin.Templates
        run: dotnet pack NeoAdmin.Templates/NeoAdmin.Templates.csproj -c Release -o ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

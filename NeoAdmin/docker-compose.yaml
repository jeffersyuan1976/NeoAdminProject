# 路径均相对本文件所在目录（NeoAdmin/），可在服务器任意目录克隆后执行 docker-auto.sh
services:
  neoadmin:
    build:
      # 仓库根目录（相对 compose 文件向上一级）
      context: ..
      dockerfile: NeoAdmin/Dockerfile
    image: neoadmin:latest
    container_name: neoadmin
    ports:
      - "${HOST_PORT:-6038}:80"
    environment:
      TZ: Asia/Shanghai
    working_dir: /app
    volumes:
      - ./Logs:/app/Logs
      - ./wwwroot/uploads:/app/wwwroot/uploads
      - ./wwwroot/avatars:/app/wwwroot/avatars
      - ./keys:/app/keys
      - ./neoadmin.db:/app/neoadmin.db
    restart: unless-stopped

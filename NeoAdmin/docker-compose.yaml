services:
  neoadmin:
    build:
      context: ..
      dockerfile: NeoAdmin/Dockerfile
    image: neoadmin:latest
    container_name: neoadmin
    ports:
      - "${HOST_PORT:-6038}:80"
    environment:
      TZ: Asia/Shanghai
    working_dir: /app
    volumes:
      - ./Logs:/app/Logs
      - ./wwwroot/uploads:/app/wwwroot/uploads
      - ./wwwroot/avatars:/app/wwwroot/avatars
      - ./keys:/app/keys
      - ./neoadmin.db:/app/neoadmin.db
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
